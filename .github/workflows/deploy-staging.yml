name: CI/CD Gym App - Staging

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend (Staging)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:staging

      - name: Build and push Frontend (Staging)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-frontend:staging

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check secret existence
        run: |
          echo "REDIS_PASSWORD length = ${#REDIS_PASSWORD}"
        env:
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}

      - name: Copy Docker Compose (Staging)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.staging.yml"
          target: "~/app-staging"

      - name: Copy Nginx Config (Staging)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "nginx-staging.conf"
          target: "~/app-staging"

      - name: Deploy to Staging Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # Handle SSL certificates
            sudo cp -r /etc/letsencrypt/archive/* /home/azureuser/app-staging/certbot/conf/archive/ 2>/dev/null || true
            sudo cp -r /etc/letsencrypt/live/* /home/azureuser/app-staging/certbot/conf/live/ 2>/dev/null || true
            sudo chown -R azureuser:azureuser /home/azureuser/app-staging/certbot 2>/dev/null || true
            
            # Clean up old containers
            docker rm -f gym-trainer-backend-staging 2>/dev/null || true

            docker rm -f gym-trainer-frontend-staging 2>/dev/null || true
            
            mkdir -p ~/app-staging
            cd ~/app-staging
            
            # Create .env file
            cat > .env << EOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DB_URL=jdbc:postgresql://postgres-staging:5432/aigym_staging
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            EOF

            # Deploy with docker compose
            echo "📦 Pulling images..."
            docker compose -f docker-compose.staging.yml pull

            echo "🐳 Starting containers..."
            docker compose -f docker-compose.staging.yml up -d

            echo "⏳ Waiting for containers to be ready..."
            sleep 30

            # Check deployment status
            if docker ps | grep -q staging; then
              echo "✅ Staging Deployment Successful!"
              docker ps | grep staging
            else
              echo "❌ Staging Deployment Failed!"
              docker compose -f docker-compose.staging.yml logs --tail 50
              exit 1
            fi

            #retest ci cd 1 more time