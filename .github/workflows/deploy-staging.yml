name: CI/CD Gym App - Staging

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend (Staging)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:staging

      - name: Build and push Frontend (Staging)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-frontend:staging

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script_stop: true
          script: |
            mkdir -p ~/app-staging
            cd ~/app-staging
            
            cat > docker-compose.staging.yml << 'EOF'
            version: '3.8'
            services:
              postgres-staging:
                image: postgres:15-alpine
                container_name: gym-trainer-postgres-staging
                environment:
                  POSTGRES_DB: aigym_staging
                  POSTGRES_USER: ${DB_USERNAME}
                  POSTGRES_PASSWORD: ${DB_PASSWORD}
                volumes:
                  - postgres_data_staging:/var/lib/postgresql/data
                restart: unless-stopped
                networks:
                  - gym-network-staging
              redis-staging:
                image: redis/redis-stack:latest
                container_name: gym-trainer-redis-staging
                command: redis-server --requirepass ${REDIS_PASSWORD}
                networks:
                  - gym-network-staging
                volumes:
                  - redis_data_staging:/data
                restart: unless-stopped
              backend-staging:
                image: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:staging
                container_name: gym-trainer-backend-staging
                environment:
                  - DB_URL=${DB_URL}
                  - DB_USERNAME=${DB_USERNAME}
                  - DB_PASSWORD=${DB_PASSWORD}
                  - JWT_SECRET=${JWT_SECRET}
                  - REDIS_HOST=${REDIS_HOST}
                  - REDIS_PASSWORD=${REDIS_PASSWORD}
                  - ADMIN_EMAIL=${ADMIN_EMAIL}
                  - ADMIN_PASSWORD=${ADMIN_PASSWORD}
                  - MAIL_HOST=${MAIL_HOST}
                  - MAIL_PORT=${MAIL_PORT}
                  - MAIL_USERNAME=${MAIL_USERNAME}
                  - MAIL_PASSWORD=${MAIL_PASSWORD}
                  - SPRING_PROFILES_ACTIVE=staging
                depends_on:
                  - postgres-staging
                  - redis-staging
                networks:
                  - gym-network-staging
                restart: unless-stopped
              frontend-staging:
                image: ${{ secrets.DOCKER_USERNAME }}/gymapp-frontend:staging
                container_name: gym-trainer-frontend-staging
                ports:
                  - "80:80"
                  - "443:443"
                volumes:
                  - ./nginx-staging.conf:/etc/nginx/conf.d/default.conf
                depends_on:
                  - backend-staging
                networks:
                  - gym-network-staging
                restart: unless-stopped
            volumes:
              postgres_data_staging:
              redis_data_staging:
            networks:
              gym-network-staging:
                driver: bridge
            EOF
            
            cat > nginx-staging.conf << 'EOF'
            server {
                listen 80;
                server_name _;
                location /api {
                    proxy_pass http://backend-staging:8080;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                }
                location / {
                    proxy_pass http://backend-staging:8080;
                    proxy_set_header Host $host;
                }
            }
            EOF
            
            cat > .env << 'EOF'
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DB_URL=${{ secrets.DB_URL }}
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REDIS_HOST=${{ secrets.REDIS_HOST }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            EOF
            
            docker compose -f docker-compose.staging.yml down --remove-orphans
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d --force-recreate
            docker image prune -f
            
            if [ "$(docker inspect -f '{{.State.Running}}' gym-trainer-backend-staging 2>/dev/null)" == "true" ]; then
                echo "✅ Staging Deployment Successful"
                docker ps | grep staging
            else
                echo "❌ Staging Deployment Failed"
                docker compose -f docker-compose.staging.yml logs --tail 100
                exit 1
            fi