name: CI/CD Gym App - Staging

on:
  push:
    branches: [ "staging" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend (Staging)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:staging

      - name: Build and push Frontend (Staging)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-frontend:staging

  deploy-staging:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Staging Azure VM
        run: |
          # Setup SSH key
          mkdir -p ~/.ssh
          echo "${{ secrets.AZURE_SSH_KEY }}" > ~/.ssh/azure_key
          chmod 600 ~/.ssh/azure_key
          
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/azure_key ${{ secrets.AZURE_USERNAME }}@${{ secrets.AZURE_SERVER_IP }} '
            rm -rf ~/app-staging
            mkdir -p ~/app-staging
            cd ~/app-staging
            
            echo 'server {
                listen 80;
                server_name _;
                location /api {
                    proxy_pass http://backend-staging:8080;
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                }
                location / {
                    root /usr/share/nginx/html;
                    try_files \$uri \$uri/ /index.html;
                }
            }' > nginx-staging.conf
            
            echo 'services:
              postgres-staging:
                image: postgres:15-alpine
                container_name: gym-trainer-postgres-staging
                environment:
                  POSTGRES_DB: aigym_staging
                  POSTGRES_USER: ${{ secrets.DB_USERNAME }}
                  POSTGRES_PASSWORD: ${{ secrets.DB_PASSWORD }}
                volumes:
                  - postgres_data_staging:/var/lib/postgresql/data
                restart: unless-stopped
              backend-staging:
                image: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:staging
                container_name: gym-trainer-backend-staging
                environment:
                  - SPRING_PROFILES_ACTIVE=docker,staging
                  - DB_URL=jdbc:postgresql://postgres-staging:5432/aigym_staging
                  - DB_USERNAME=${{ secrets.DB_USERNAME }}
                  - DB_PASSWORD=${{ secrets.DB_PASSWORD }}
                  - JWT_SECRET=${{ secrets.JWT_SECRET }}
                  - ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
                  - ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
                  - MAIL_HOST=${{ secrets.MAIL_HOST }}
                  - MAIL_PORT=${{ secrets.MAIL_PORT }}
                  - MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
                  - MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
                depends_on:
                  - postgres-staging
                restart: unless-stopped
              frontend-staging:
                image: ${{ secrets.DOCKER_USERNAME }}/gymapp-frontend:staging
                container_name: gym-trainer-frontend-staging
                ports:
                  - \"80:80\"
                volumes:
                  - ./nginx-staging.conf:/etc/nginx/conf.d/default.conf
                depends_on:
                  - backend-staging
                restart: unless-stopped
            volumes:
              postgres_data_staging:' > docker-compose.staging.yml
            
            echo 'DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DB_URL=jdbc:postgresql://postgres-staging:5432/aigym_staging
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            REDIS_HOST=redis-staging
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}' > .env
            
            docker compose -f docker-compose.staging.yml down --remove-orphans 2>/dev/null
            docker compose -f docker-compose.staging.yml pull
            docker compose -f docker-compose.staging.yml up -d
            
            sleep 30
            if docker ps | grep -q staging; then
              echo '✅ Deployment successful'
            else
              echo '❌ Deployment failed'
              docker compose -f docker-compose.staging.yml logs --tail 100
              exit 1
            fi
          '