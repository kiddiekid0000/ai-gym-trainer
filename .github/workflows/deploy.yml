name: CI/CD Gym App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      #cache Maven to build faster
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # Pull new image from Docker hub
            docker pull ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest
            
            # Stop old container 
            docker stop gymapp-container || true
            docker rm gymapp-container || true
            
            # Run container with variables from GitHub Secrets
            # -Xmx2g to limit Java using only 2GB, leave 2GB for OS, Redis, DB
            docker run -d \
              --name gymapp-container \
              --network gymapp-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=docker \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e ADMIN_EMAIL='${{ secrets.ADMIN_EMAIL }}' \
              -e ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' \
              -e MAIL_HOST='${{ secrets.MAIL_HOST }}' \
              -e MAIL_PORT='${{ secrets.MAIL_PORT }}' \
              -e MAIL_USERNAME='${{ secrets.MAIL_USERNAME }}' \
              -e MAIL_PASSWORD='${{ secrets.MAIL_PASSWORD }}' \
              -e JAVA_OPTS="-Xmx2g -Xms1g" \
              ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest

            # Health Check: wait 30s for app to start 
            echo "Waiting for app to start..."
            sleep 30
            if curl -f http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Deployment Successful: App is UP"
            else
              echo "Deployment Failed: App is not responding"
              exit 1
            fi

            #testing deploy after adding the missing part DOCKER_USERNAME