name: CI/CD Gym App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }} # Cập nhật đường dẫn pom
          restore-keys: ${{ runner.os }}-m2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend   # <--- Quan trọng: trỏ vào thư mục backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            docker pull ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest
            docker stop gymapp-container || true
            docker rm gymapp-container || true
            
            docker run -d \
              --name gymapp-container \
              --network gymapp-network \
              -p 8080:8080 \
              -e SPRING_PROFILES_ACTIVE=docker \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e ADMIN_EMAIL='${{ secrets.ADMIN_EMAIL }}' \
              -e ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' \
              -e MAIL_HOST='${{ secrets.MAIL_HOST }}' \
              -e MAIL_PORT='${{ secrets.MAIL_PORT }}' \
              -e MAIL_USERNAME='${{ secrets.MAIL_USERNAME }}' \
              -e MAIL_PASSWORD='${{ secrets.MAIL_PASSWORD }}' \
              -e JAVA_OPTS="-Xmx512m -Xms256m" \
              ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest

            echo "Waiting for app to start..."
            sleep 60
            if curl -f http://localhost:8080/actuator/health | grep -q "UP"; then
              echo "Deployment Successful"
            else
              echo "Deployment Failed"
              exit 1
            fi


            #adding comment for re-push after modifying azure variable from git hub secret