name: CI/CD Gym App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # 1. Pull ảnh mới nhất
            docker pull ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest
            
            # 2. Dọn dẹp container cũ
            docker stop gymapp-container || true
            docker rm gymapp-container || true
            
            # 3. Chạy container mới với biến môi trường linh hoạt
            docker run -d \
              --name gymapp-container \
              --network gymapp-network \
              -p 8080:8080 \
              -e DB_URL='${{ secrets.DB_URL }}' \
              -e REDIS_HOST='${{ secrets.REDIS_HOST }}' \
              -e SPRING_PROFILES_ACTIVE=docker \
              -e DB_USERNAME='${{ secrets.DB_USERNAME }}' \
              -e DB_PASSWORD='${{ secrets.DB_PASSWORD }}' \
              -e REDIS_PASSWORD='${{ secrets.REDIS_PASSWORD }}' \
              -e JWT_SECRET='${{ secrets.JWT_SECRET }}' \
              -e ADMIN_EMAIL='${{ secrets.ADMIN_EMAIL }}' \
              -e ADMIN_PASSWORD='${{ secrets.ADMIN_PASSWORD }}' \
              -e MAIL_HOST='${{ secrets.MAIL_HOST }}' \
              -e MAIL_PORT='${{ secrets.MAIL_PORT }}' \
              -e MAIL_USERNAME='${{ secrets.MAIL_USERNAME }}' \
              -e MAIL_PASSWORD='${{ secrets.MAIL_PASSWORD }}' \
              -e SPRING_JPA_HIBERNATE_DDL_AUTO=update \
              -e JAVA_OPTS="-Xmx512m -Xms256m" \
              ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest

            # 4. Kiểm tra sức khỏe App (Health Check)
            echo "Waiting for app to start and Hibernate to sync..."
            sleep 45
            
            if curl -s http://localhost:8080/actuator/health | grep -q "status"; then
              echo "Deployment Successful - App is UP"
              docker ps
            else
              echo "Deployment Failed - Check logs below:"
              docker logs --tail 100 gymapp-container
              exit 1
            fi