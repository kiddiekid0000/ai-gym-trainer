name: CI/CD Gym App - Production

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/backend/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend (Production)
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-backend:latest

      - name: Build and push Frontend (Production)
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ secrets.DOCKER_USERNAME }}/gymapp-frontend:latest

  deploy-production:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: production
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy Docker Compose (Production)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "docker-compose.yml"
          target: "~/app"
          overwrite: true

      - name: Copy Nginx Config (Production)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "nginx.conf"
          target: "~/app"
          overwrite: true

      - name: Copy Monitoring Configuration (Production)
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          source: "monitoring"
          target: "~/app"
          overwrite: true

      - name: Deploy to Production Azure VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZURE_SERVER_IP }}
          username: ${{ secrets.AZURE_USERNAME }}
          key: ${{ secrets.AZURE_SSH_KEY }}
          script: |
            # Handle SSL certificates
            sudo cp -r /etc/letsencrypt/archive/* /home/azureuser/app/certbot/conf/archive/ 2>/dev/null || true
            sudo cp -r /etc/letsencrypt/live/* /home/azureuser/app/certbot/conf/live/ 2>/dev/null || true
            sudo chown -R azureuser:azureuser /home/azureuser/app/certbot 2>/dev/null || true
            
            # Clean up old containers
            docker rm -f gym-trainer-backend 2>/dev/null || true
            docker rm -f gym-trainer-frontend 2>/dev/null || true
            
            mkdir -p ~/app
            cd ~/app
            
            # Create .env file
            cat > .env << EOF
            DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}
            DB_URL=jdbc:postgresql://postgres:5432/aigym
            DB_USERNAME=${{ secrets.DB_USERNAME }}
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
            MAIL_HOST=${{ secrets.MAIL_HOST }}
            MAIL_PORT=${{ secrets.MAIL_PORT }}
            MAIL_USERNAME=${{ secrets.MAIL_USERNAME }}
            MAIL_PASSWORD=${{ secrets.MAIL_PASSWORD }}
            REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}
            GRAFANA_ADMIN_USER=${{ secrets.GRAFANA_ADMIN_USER || 'admin' }}
            GRAFANA_ADMIN_PASSWORD=${{ secrets.GRAFANA_ADMIN_PASSWORD || 'admin' }}
            EOF

            echo "📦 Pulling images..."
            docker compose -f docker-compose.yml pull

            echo "🐳 Starting containers..."
            docker compose -f docker-compose.yml up -d

            echo "⏳ Waiting for containers to be ready..."
            sleep 30

            # Check deployment status
            if docker ps | grep -q gym-trainer-frontend; then
              echo "✅ Production Deployment Successful!"
              docker ps
              exit 0
            else
              echo "❌ Production Deployment Failed!"
              docker compose -f docker-compose.yml logs --tail 50
              exit 1
            fi