# H2 Database for testing (in-memory)
spring.datasource.url=jdbc:h2:mem:testdb;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 dialect for JPA
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Disable Flyway for tests
spring.flyway.enabled=false

# Admin configuration for tests
admin.email=admin@test.com
admin.password=testAdminPassword123

# JWT configuration for tests
jwt.secret=testSecretKeyForUnitTestingOnly1234567890abcdefghijklmnop
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# OTP configuration
auth.otp.length=6
auth.otp.ttl-minutes=10
auth.otp.max-failed-attempts=3
auth.otp.block-duration-hours=1
auth.otp.max-resend-attempts=5
auth.otp.resend-window-seconds=60

# Rate limiting configuration
auth.ratelimit.ip-limit=10
auth.ratelimit.user-limit=20
auth.ratelimit.window-seconds=60

# Pending account cleanup
auth.pending-account-cleanup-hours=24

# Application environment
app.environment=test

# Redis configuration - DISABLED for tests
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=
spring.cache.type=simple
spring.data.redis.repositories.enabled=false

# Mail configuration - test mode
spring.mail.host=localhost
spring.mail.port=9999
spring.mail.username=test
spring.mail.password=test
spring.mail.protocol=smtp
spring.mail.test-connection=false

# Management endpoints
management.endpoint.health.show-details=always

spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
