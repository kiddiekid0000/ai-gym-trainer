spring.datasource.url=jdbc:postgresql://localhost:5432/aigym
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# !!!!!REMEMBER TO CHANGE "ddl-auto=update" to "validate" before deploying!!!!
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
# spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Admin configuration
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# JWT configuration
jwt.secret=${JWT_SECRET}

# Application environment (development or production)
app.environment=development

# Redis configuration
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=60000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=0

# REDIS PASSWORD
spring.data.redis.password=${REDIS_PASSWORD}

# Email configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.jpa.open-in-view=false

# Disable auto-config for UserDetailsService
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.security.servlet.UserDetailsServiceAutoConfiguration

# Enable DEBUG logging for token blacklist feature
logging.level.com.aigymtrainer.backend=DEBUG