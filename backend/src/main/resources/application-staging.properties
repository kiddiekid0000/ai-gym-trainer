spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Admin configuration
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# JWT configuration
jwt.secret=${JWT_SECRET}

# Redis configuration for Docker Staging (uses service name 'redis-staging')
spring.data.redis.host=redis-staging
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=60000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=0

# JWT expiration times
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# OTP config:
auth.otp.length=6
auth.otp.ttl-minutes=10
auth.otp.max-failed-attempts=3
auth.otp.block-duration-hours=1
auth.otp.max-resend-attempts=5
auth.otp.resend-window-seconds=60

# Rate limiting - HIGHER for staging testing (NOTE: Modify these values here for staging)
auth.ratelimit.ip-limit=50
auth.ratelimit.user-limit=100
auth.ratelimit.window-seconds=60

# Cleanup:
auth.pending-account-cleanup-hours=24

# Environment flag for staging
app.environment=staging

# Trust the proxy to handle the headers
server.forward-headers-strategy=framework

# Email configuration - Mailtrap for staging
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging - DEBUG level for staging
logging.level.root=WARN
logging.level.com.aigymtrainer.backend=DEBUG
logging.level.com.aigymtrainer.backend.auth=DEBUG
logging.level.com.aigymtrainer.backend.security=DEBUG
logging.level.org.springframework.security=DEBUG

# Logging pattern with environment tag
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - [STAGING] - %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} - [STAGING] - %logger{36} - %msg%n
