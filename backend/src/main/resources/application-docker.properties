spring.datasource.url=${DB_URL:jdbc:postgresql://postgres:5432/aigym}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Admin configuration
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}

# JWT configuration
jwt.secret=${JWT_SECRET}

# Redis configuration for Docker (uses service name 'redis' instead of localhost)
spring.data.redis.host=redis
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=60000ms
spring.data.redis.lettuce.pool.max-active=10
spring.data.redis.lettuce.pool.max-idle=5
spring.data.redis.lettuce.pool.min-idle=1
spring.data.redis.lettuce.pool.max-wait=0


# JWT expiration times
jwt.access-token-expiration=900000
jwt.refresh-token-expiration=604800000

# OTP config:
auth.otp.length=6
auth.otp.ttl-minutes=10
auth.otp.max-failed-attempts=3
auth.otp.block-duration-hours=1
auth.otp.max-resend-attempts=5
auth.otp.resend-window-seconds=60

# rate limiting:
auth.ratelimit.ip-limit=10
auth.ratelimit.user-limit=20
auth.ratelimit.window-seconds=60

# cleanup:
auth.pending-account-cleanup-hours=24

# environment flag:
app.environment=production

# email service configuration
spring.mail.host=${MAIL_HOST}
spring.mail.port=${MAIL_PORT}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
