server {
    listen 80;
    server_name gymaitrainer.duckdns.org;

    # Endpoint for Certbot domain verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}