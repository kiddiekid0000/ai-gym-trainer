version: '3.8'

services:
  redis:
    image: redis/redis-stack:latest
    container_name: gym-trainer-redis
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - gym-network
    volumes:
      - redis_data:/data
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: gym-trainer-postgres
    env_file:
      - .env
    environment:
      POSTGRES_DB: aigym
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - gym-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped

  gym-trainer-backend:
    image: ${DOCKER_USERNAME}/gymapp-backend:latest
    container_name: gym-trainer-backend
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MAIL_HOST=${MAIL_HOST}        
      - MAIL_PORT=${MAIL_PORT}        
      - MAIL_USERNAME=${MAIL_USERNAME} 
      - MAIL_PASSWORD=${MAIL_PASSWORD} 
    depends_on:
      - redis
      - postgres
    networks:
      gym-network:
        aliases:
          - gymapp-container
    restart: unless-stopped

  frontend:
    image: ${DOCKER_USERNAME}/gymapp-frontend:latest
    container_name: gym-trainer-frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - gym-trainer-backend
    networks:
      - gym-network
    restart: unless-stopped

  certbot:
    image: certbot/certbot
    container_name: gym-trainer-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - gym-network

networks:
  gym-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: