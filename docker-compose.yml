
services:
  redis:
    image: redis/redis-stack:latest
    container_name: gym-trainer-redis
    env_file:
      - backend/.env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-default_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gym-network
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
    restart: unless-stopped

  postgres:
    image: postgres:15-alpine
    container_name: gym-trainer-postgres
    env_file:
      - backend/.env
    environment:
      POSTGRES_DB: aigym
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME} -d aigym"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - gym-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    restart: unless-stopped

  gym-trainer-backend:
    build: ./backend
    container_name: gym-trainer-backend
    env_file:
      - backend/.env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    # ports: - "8080:8080"  <-- TẮT CỔNG NÀY ĐỂ CHẶN HACKER
    volumes:
      - ./backend/.env:/gym-trainer-be/.env
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 20s
      timeout: 10s
      retries: 3
    networks:
      - gym-network
    deploy:
      resources:
        limits:
          memory: 1G
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: gym-trainer-frontend
    ports:
      - "80:80"
    depends_on:
      gym-trainer-backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    networks:
      - gym-network
    restart: unless-stopped

networks:
  gym-network:
    driver: bridge

volumes:
  postgres_data:
  redis_data: