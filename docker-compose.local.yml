services:
  redis:
    image: redis/redis-stack:latest
    container_name: gym-trainer-redis-local
    env_file:
      - .env
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispasswordofphuongdeptrai123ohyeah}
    ports:
      - "6379:6379"
    networks:
      - gym-network-local
    volumes:
      - redis_data_local:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redispasswordofphuongdeptrai123ohyeah}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres:
    image: postgres:15-alpine
    container_name: gym-trainer-postgres-local
    env_file:
      - .env
    environment:
      POSTGRES_DB: aigym
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-123456}
    ports:
      - "5432:5432"
    networks:
      - gym-network-local
    volumes:
      - postgres_data_local:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  gym-trainer-backend:
    image: ${DOCKER_USERNAME:-phuongse}/gymapp-backend:latest
    container_name: gym-trainer-backend-local
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      - SPRING_PROFILES_ACTIVE=local
      - DB_URL=jdbc:postgresql://postgres:5432/aigym
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-123456}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@local.dev}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - JWT_SECRET=${JWT_SECRET:-localDevelopmentSecretKeyThatIsAtLeast32CharactersLongForJWT123456789}
      - REDIS_HOST=redis
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redispasswordofphuongdeptrai123ohyeah}
      - MAIL_HOST=${MAIL_HOST:-smtp.gmail.com}
      - MAIL_PORT=${MAIL_PORT:-587}
      - MAIL_USERNAME=${MAIL_USERNAME:-phuonghoi223@gmail.com}
      - MAIL_PASSWORD=${MAIL_PASSWORD:-uyeg isab gkkp bhuj}
      - APP_ENV=development
    ports:
      - "8080:8080"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - gym-network-local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  gym-trainer-frontend-local:
    image: ${DOCKER_USERNAME:-phuongse}/gymapp-frontend:latest
    container_name: gym-trainer-frontend-local
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      gym-trainer-backend:
        condition: service_healthy
    networks:
      - gym-network-local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

networks:
  gym-network-local:
    driver: bridge

volumes:
  postgres_data_local:
  redis_data_local:
