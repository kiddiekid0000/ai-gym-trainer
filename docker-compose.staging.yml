version: '3.8'

services:
  redis-staging:
    image: redis/redis-stack:latest
    container_name: gym-trainer-redis-staging
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - gym-network-staging
    volumes:
      - redis_data_staging:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  postgres-staging:
    image: postgres:15-alpine
    container_name: gym-trainer-postgres-staging
    environment:
      POSTGRES_DB: aigym_staging
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - gym-network-staging
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  gym-trainer-backend-staging:
    image: ${DOCKER_USERNAME}/gymapp-backend:staging
    container_name: gym-trainer-backend-staging
    environment:
      - SPRING_PROFILES_ACTIVE=docker,staging,metrics
      - DB_URL=jdbc:postgresql://postgres-staging:5432/aigym_staging
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis-staging
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MAIL_HOST=${MAIL_HOST}        
      - MAIL_PORT=${MAIL_PORT}        
      - MAIL_USERNAME=${MAIL_USERNAME} 
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - APP_ENV=staging
    depends_on:
      redis-staging:
        condition: service_healthy
      postgres-staging:
        condition: service_healthy
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend-staging:
    image: ${DOCKER_USERNAME}/gymapp-frontend:staging
    container_name: gym-trainer-frontend-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      gym-trainer-backend-staging:
        condition: service_healthy
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s

  certbot-staging:
    image: certbot/certbot
    container_name: gym-trainer-certbot-staging
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - gym-network-staging
    restart: unless-stopped

  # ===== STAGING MONITORING SERVICES =====

  postgres-exporter-staging:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: gym-trainer-postgres-exporter-staging
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USERNAME}:${DB_PASSWORD}@postgres-staging:5432/aigym_staging?sslmode=disable"
    depends_on:
      postgres-staging:
        condition: service_healthy
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9187/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3

  redis-exporter-staging:
    image: oliver006/redis_exporter:latest
    container_name: gym-trainer-redis-exporter-staging
    environment:
      REDIS_ADDR: "redis-staging:6379"
      REDIS_PASSWORD: "${REDIS_PASSWORD}"
    depends_on:
      redis-staging:
        condition: service_healthy
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9121/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3

  node-exporter-staging:
    image: prom/node-exporter:latest
    container_name: gym-trainer-node-exporter-staging
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9100/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3

  nginx-exporter-staging:
    image: nginx/nginx-prometheus-exporter:latest
    container_name: gym-trainer-nginx-exporter-staging
    command:
      - -nginx.scrape-uri=http://frontend-staging/nginx_status
    depends_on:
      frontend-staging:
        condition: service_healthy
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9113/metrics"]
      interval: 15s
      timeout: 5s
      retries: 3

  prometheus-staging:
    image: prom/prometheus:latest
    container_name: gym-trainer-prometheus-staging
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--storage.tsdb.retention.size=50GB'
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/prometheus/alert-rules.yml:/etc/prometheus/alert-rules.yml:ro
      - prometheus_data_staging:/prometheus
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 3

  grafana-staging:
    image: grafana/grafana:latest
    container_name: gym-trainer-grafana-staging
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_INSTALL_PLUGINS: grafana-piechart-panel
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: "http://localhost:3000"
    volumes:
      - ./monitoring/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./monitoring/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - grafana_data_staging:/var/lib/grafana
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3

volumes:
  redis_data_staging:
  postgres_data_staging:
  prometheus_data_staging:
  grafana_data_staging:

networks:
  gym-network-staging:
