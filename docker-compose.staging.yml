services:
  redis-staging:
    image: redis/redis-stack:latest
    container_name: gym-trainer-redis-staging
    # env_file:
    #   - .env
    command: redis-server --requirepass ${REDIS_PASSWORD}
    networks:
      - gym-network-staging
    volumes:
      - redis_data_staging:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

  postgres-staging:
    image: postgres:15-alpine
    container_name: gym-trainer-postgres-staging
    # env_file:
    #   - .env
    environment:
      POSTGRES_DB: aigym_staging
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    networks:
      - gym-network-staging
    volumes:
      - postgres_data_staging:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME}"]
      interval: 10s
      timeout: 5s
      retries: 3

  gym-trainer-backend-staging:
    image: ${DOCKER_USERNAME}/gymapp-backend:staging
    container_name: gym-trainer-backend-staging
    # env_file:
    #   - .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker,staging
      - DB_URL=jdbc:postgresql://postgres-staging:5432/aigym_staging
      - DB_USERNAME=${DB_USERNAME}
      - DB_PASSWORD=${DB_PASSWORD}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - REDIS_HOST=redis-staging
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - MAIL_HOST=${MAIL_HOST}        
      - MAIL_PORT=${MAIL_PORT}        
      - MAIL_USERNAME=${MAIL_USERNAME} 
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - APP_ENV=staging
    depends_on:
      redis-staging:
        condition: service_healthy
      postgres-staging:
        condition: service_healthy
    networks:
      - gym-network-staging
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend-staging:
    image: ${DOCKER_USERNAME}/gymapp-frontend:staging
    container_name: gym-trainer-frontend-staging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx-staging.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    depends_on:
      - gym-trainer-backend-staging
    networks:
      - gym-network-staging
    restart: unless-stopped

  certbot-staging:
    image: certbot/certbot
    container_name: gym-trainer-certbot-staging
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - gym-network-staging
    restart: unless-stopped

volumes:
  redis_data_staging:
  postgres_data_staging:

networks:
  gym-network-staging:
